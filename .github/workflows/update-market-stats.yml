name: Update Market Stats (Zillow)

on:
  schedule:
    - cron: '0 14 1 * *'  # 1st of every month at 7am PT
  workflow_dispatch:       # Manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Zillow market data
        run: npx tsx scripts/fetch-zillow-data.ts

      - name: Commit and push updated stats
        run: |
          git config user.name "Chris Nevada"
          git config user.email "chris@reno775.com"
          git add public/data/market-stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update market stats from Zillow Research (monthly)"
            git push
          fi
